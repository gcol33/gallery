<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landscapes in Spring — Gilles Colling</title>
  <meta name="description" content="Landscapes in spring by Gilles Colling.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poiret+One&family=Outfit:wght@200;300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <a class="wordmark" href="hub.html">Gilles Colling<span class="wordmark-sub">All Photographs</span></a>
    <div class="header-right">
      <nav class="header-nav">
        <a class="header-project" href="comedy-wildlife.html">Comedy Wildlife</a>
        <a class="header-project" href="zoo.html">Zoo</a>
        <span class="header-project active">Landscapes in Spring</span>
      </nav>
      <button class="view-toggle" id="viewToggle" aria-label="Toggle view">
        <svg class="icon-grid" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="1" y="1" width="7" height="7"/><rect x="10" y="1" width="7" height="7"/>
          <rect x="1" y="10" width="7" height="7"/><rect x="10" y="10" width="7" height="7"/>
        </svg>
        <svg class="icon-col" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="3" y="1" width="12" height="16"/>
        </svg>
      </button>
    </div>
  </header>

  <!--
    All 9 images are 3:2 landscape (ratio 0.667).
    Balanced 3x3 column layout: each column = 2.00.
  -->
  <main class="gallery" id="gallery">

    <!-- Col 1 -->
    <article class="gallery-item" data-title="Monolith">
      <img src="photos/landscapes-spring/monolith.jpg" alt="Flak tower silhouette above parkland" loading="lazy">
      <figcaption class="col-caption">Monolith</figcaption>
    </article>

    <article class="gallery-item" data-title="Outpost">
      <img src="photos/landscapes-spring/outpost.jpg" alt="Hunting tower on plowed field under overcast sky" loading="lazy">
      <figcaption class="col-caption">Outpost</figcaption>
    </article>

    <article class="gallery-item" data-title="Track">
      <img src="photos/landscapes-spring/track.jpg" alt="Dirt track beside potato field with cumulus clouds" loading="lazy">
      <figcaption class="col-caption">Track</figcaption>
    </article>

    <!-- Col 2 -->
    <article class="gallery-item col-break" data-title="Corn and Rabbit">
      <img src="photos/landscapes-spring/rabbit.jpg" alt="Rabbit in a young corn field" loading="lazy">
      <figcaption class="col-caption">Corn and Rabbit</figcaption>
    </article>

    <article class="gallery-item" data-title="Grid">
      <img src="photos/landscapes-spring/grid.jpg" alt="Electricity pylons over open fields" loading="lazy">
      <figcaption class="col-caption">Grid</figcaption>
    </article>

    <article class="gallery-item" data-title="Reach">
      <img src="photos/landscapes-spring/reach.jpg" alt="River sunset with power lines overhead" loading="lazy">
      <figcaption class="col-caption">Reach</figcaption>
    </article>

    <!-- Col 3 -->
    <article class="gallery-item col-break" data-title="Chimney">
      <img src="photos/landscapes-spring/chimney.jpg" alt="Power plant chimney at dusk beside a river" loading="lazy">
      <figcaption class="col-caption">Chimney</figcaption>
    </article>

    <article class="gallery-item" data-title="Crossing">
      <img src="photos/landscapes-spring/crossing.jpg" alt="Concrete bridge over river at dusk" loading="lazy">
      <figcaption class="col-caption">Crossing</figcaption>
    </article>

    <article class="gallery-item" data-title="Turbine">
      <img src="photos/landscapes-spring/turbine.jpg" alt="Wind turbine silhouette at blue hour" loading="lazy">
      <figcaption class="col-caption">Turbine</figcaption>
    </article>

  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="lightbox-counter"></span>
    <button class="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-nav lightbox-prev" aria-label="Previous">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button class="lightbox-nav lightbox-next" aria-label="Next">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <img class="lightbox-img" src="" alt="">
    <div class="lightbox-caption">
      <div class="lightbox-caption-title"></div>
    </div>
  </div>

  <footer class="footer">
    <nav class="footer-nav">
      <a class="footer-nav-link" href="zoo.html">
        <span class="footer-nav-arrow">&larr;</span>
        <span class="footer-nav-text">Zoo</span>
      </a>
      <span class="footer-text">&copy; Gilles Colling</span>
      <a class="footer-nav-link" href="hub.html">
        <span class="footer-nav-text">All Themes</span>
        <span class="footer-nav-arrow">&rarr;</span>
      </a>
    </nav>
  </footer>

  <script src="gallery.js"></script>
</body>
</html>
