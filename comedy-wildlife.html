<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comedy Wildlife — Gilles Colling</title>
  <meta name="description" content="Comedy Wildlife photography by Gilles Colling.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poiret+One&family=Outfit:wght@200;300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <a class="wordmark" href="hub.html">Gilles Colling<span class="wordmark-sub">All Photographs</span></a>
    <div class="header-right">
      <nav class="header-nav">
        <span class="header-project active">Comedy Wildlife</span>
        <a class="header-project" href="birds.html">Birds</a>
        <a class="header-project" href="wildlife.html">Wildlife</a>
        <a class="header-project" href="landscapes-spring.html">Landscapes in Spring</a>
      </nav>
      <button class="view-toggle" id="viewToggle" aria-label="Toggle view">
        <svg class="icon-grid" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="1" y="1" width="7" height="7"/><rect x="10" y="1" width="7" height="7"/>
          <rect x="1" y="10" width="7" height="7"/><rect x="10" y="10" width="7" height="7"/>
        </svg>
        <svg class="icon-col" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="3" y="1" width="12" height="16"/>
        </svg>
      </button>
    </div>
  </header>

  <!--
    Balanced column order (CSS columns fill top-to-bottom):
    Col 1: deer(0.666) + heron_open(0.856) + mantis(1.133) = 2.655
    Col 2: beetles(0.700) + seagull(1.290) + pigeon(0.666) = 2.656
    Col 3: eels(0.617) + heron_totem(0.750) + swan(1.289) = 2.656
  -->
  <main class="gallery" id="gallery">

    <!-- Col 1 -->
    <article class="gallery-item" data-title="The Commuter">
      <img src="photos/comedy-wildlife/deer_commute.jpg" alt="Deer walking with pedestrians at a crosswalk" loading="lazy">
      <figcaption class="col-caption">The Commuter</figcaption>
    </article>

    <article class="gallery-item" data-title="Open">
      <img src="photos/comedy-wildlife/heron_open_sign.jpg" alt="Heron standing under an Open sign" loading="lazy">
      <figcaption class="col-caption">Open</figcaption>
    </article>

    <article class="gallery-item" data-title="Poolside">
      <img src="photos/comedy-wildlife/mantis_lounger.jpg" alt="Praying mantis on a pool lounger" loading="lazy">
      <figcaption class="col-caption">Poolside</figcaption>
    </article>

    <!-- Col 2 -->
    <article class="gallery-item col-break" data-title="Beetles on the Line">
      <img src="photos/comedy-wildlife/beetles_clothesline.jpg" alt="Beetles hanging from a clothesline" loading="lazy">
      <figcaption class="col-caption">Beetles on the Line</figcaption>
    </article>

    <article class="gallery-item" data-title="Harbour Master">
      <img src="photos/comedy-wildlife/seagull_marina.jpg" alt="Seagull at a marina" loading="lazy">
      <figcaption class="col-caption">Harbour Master</figcaption>
    </article>

    <article class="gallery-item" data-title="The Venetian">
      <img src="photos/comedy-wildlife/pigeon_venice.jpg" alt="Pigeon standing on a ledge overlooking a Venice canal" loading="lazy">
      <figcaption class="col-caption">The Venetian</figcaption>
    </article>

    <!-- Col 3 -->
    <article class="gallery-item col-break" data-title="Peek">
      <img src="photos/comedy-wildlife/garden_eels_peek.jpg" alt="Garden eels peeking from the sand" loading="lazy">
      <figcaption class="col-caption">Peek</figcaption>
    </article>

    <article class="gallery-item" data-title="King of the Hill">
      <img src="photos/comedy-wildlife/heron_totem.jpg" alt="Heron perched on a wooden totem pole sculpture" loading="lazy">
      <figcaption class="col-caption">King of the Hill</figcaption>
    </article>

    <article class="gallery-item" data-title="Bottoms Up">
      <img src="photos/comedy-wildlife/swan_bottoms_up.jpg" alt="Swan diving head-first into a lake" loading="lazy">
      <figcaption class="col-caption">Bottoms Up</figcaption>
    </article>

  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="lightbox-counter"></span>
    <button class="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-nav lightbox-prev" aria-label="Previous">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button class="lightbox-nav lightbox-next" aria-label="Next">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <img class="lightbox-img" src="" alt="">
    <div class="lightbox-caption">
      <div class="lightbox-caption-title"></div>
    </div>
  </div>

  <footer class="footer">
    <nav class="footer-nav">
      <a class="footer-nav-link" href="hub.html">
        <span class="footer-nav-arrow">&larr;</span>
        <span class="footer-nav-text">All Themes</span>
      </a>
      <span class="footer-text">&copy; Gilles Colling</span>
      <a class="footer-nav-link" href="birds.html">
        <span class="footer-nav-text">Birds</span>
        <span class="footer-nav-arrow">&rarr;</span>
      </a>
    </nav>
  </footer>

  <script src="gallery.js"></script>
</body>
</html>
